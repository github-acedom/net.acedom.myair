<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
</head>
<body>
    <header class="homey-header">
        <h1 class="homey-title" data-i18n="settings.title">MyAir Settings</h1>
        <p class="homey-subtitle" data-i18n="settings.subtitle">Configure your MyAir device IP address and settings</p>
    </header>

    <fieldset class="homey-form-fieldset">
        <legend class="homey-form-legend">IP Address Configuration</legend>

        <div class="homey-form-group">
            <label class="homey-form-label" for="myAirIp">MyAir IP Address</label>
            <input class="homey-form-input" id="myAirIp" type="text" value="" placeholder="192.168.x.x"/>
        </div>

        
    </fieldset>
    <fieldset class="homey-form-fieldset">
    <legend class="homey-form-legend">Other Settings</legend>
        <div class="homey-form-group">
            <label class="homey-form-label" for="pollingInterval">Polling Interval (seconds) <i>Requires app restart to take effect</i></label>
            <input class="homey-form-input" id="pollingInterval" type="number" min="60" value="60"/>
        </div>
        <div class="homey-form-group">
            <label class="homey-form-label" for="requestTimeout">Request Timeout (seconds) <i>Requires app restart to take effect</i></label>
            <input class="homey-form-input" id="requestTimeout" type="number" min="1" value="5"/>
        </div>
        <div class="homey-form-group">
            <label class="homey-form-label" for="commandThrottleEnabled">Command throttling <i>Applies immediately, no restart required</i></label>
            <input id="commandThrottleEnabled" type="checkbox"/>
        </div>
        <div class="homey-form-group">
            <label class="homey-form-label" for="commandThrottleDelayMs">Inter-command delay (ms) <i>Used when command throttling is enabled</i></label>
            <input class="homey-form-input" id="commandThrottleDelayMs" type="number" min="0" value="500"/>
        </div>
        <div class="homey-form-group">
            <label class="homey-form-label" for="retryCount">Retry count <i>Applies immediately to command and polling retries</i></label>
            <input class="homey-form-input" id="retryCount" type="number" min="0" value="1"/>
        </div>
        <div class="homey-form-group">
            <label class="homey-form-label" for="retryDelayMs">Retry delay (ms) <i>Applies immediately to command and polling retries</i></label>
            <input class="homey-form-input" id="retryDelayMs" type="number" min="0" value="500"/>
        </div>
    </fieldset>

    <button id="save" class="homey-button-primary-full">Save changes</button>

    <script type="text/javascript">
        function onHomeyReady(Homey) {
            Homey.ready(); // Indicate the settings page is loaded

            const myAirIpElement = document.getElementById('myAirIp');
            const pollingIntervalElement = document.getElementById('pollingInterval');
            const requestTimeoutElement = document.getElementById('requestTimeout');
            const commandThrottleEnabledElement = document.getElementById('commandThrottleEnabled');
            const commandThrottleDelayMsElement = document.getElementById('commandThrottleDelayMs');
            const retryCountElement = document.getElementById('retryCount');
            const retryDelayMsElement = document.getElementById('retryDelayMs');
            const saveElement = document.getElementById('save');

            function homeySet(key, value) {
                return new Promise(function (resolve, reject) {
                    Homey.set(key, value, function (err) {
                        if (err) return reject(err);
                        resolve();
                    });
                });
            }

            function updateThrottleDelayState() {
                commandThrottleDelayMsElement.disabled = !commandThrottleEnabledElement.checked;
            }

            // Load the current MyAir IP address setting
            Homey.get('myAirIp', function (err, myAirIp) {
                if (err) return Homey.alert(err);
                myAirIpElement.value = myAirIp || '';
            });

            // Load existing settings
            Homey.get('pollingInterval', function (err, value) {
                if (err) return Homey.alert(err);
                if (value) pollingIntervalElement.value = value / 1000; // Convert to seconds for display
            });

            Homey.get('requestTimeout', function (err, value) {
                if (err) return Homey.alert(err);
                if (value) requestTimeoutElement.value = value / 1000; // Convert to seconds for display
            });

            Homey.get('commandThrottleEnabled', function (err, value) {
                if (err) return Homey.alert(err);
                commandThrottleEnabledElement.checked = value === true;
                updateThrottleDelayState();
            });

            Homey.get('commandThrottleDelayMs', function (err, value) {
                if (err) return Homey.alert(err);
                const parsedDelay = parseInt(value, 10);
                commandThrottleDelayMsElement.value = !isNaN(parsedDelay) && parsedDelay >= 0 ? parsedDelay : 500;
            });

            Homey.get('retryCount', function (err, value) {
                if (err) return Homey.alert(err);
                const parsedRetryCount = parseInt(value, 10);
                retryCountElement.value = !isNaN(parsedRetryCount) && parsedRetryCount >= 0 ? parsedRetryCount : 1;
            });

            Homey.get('retryDelayMs', function (err, value) {
                if (err) return Homey.alert(err);
                const parsedRetryDelay = parseInt(value, 10);
                retryDelayMsElement.value = !isNaN(parsedRetryDelay) && parsedRetryDelay >= 0 ? parsedRetryDelay : 500;
            });

            commandThrottleEnabledElement.addEventListener('change', updateThrottleDelayState);

            // Save settings in one handler
            saveElement.addEventListener('click', async function () {
                const newIp = myAirIpElement.value.trim();
                const ipRegex = /^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
                if (!newIp || !ipRegex.test(newIp)) {
                    return Homey.alert('Please enter a valid IP address.');
                }

                const pollingIntervalSeconds = parseInt(pollingIntervalElement.value, 10);
                const pollingIntervalMillis = pollingIntervalSeconds * 1000; // Convert to milliseconds for storage
                // Ensure the interval is not less than 60 seconds
                const intervalToSave = isNaN(pollingIntervalMillis) || pollingIntervalMillis < 60000 ? 60000 : pollingIntervalMillis;

                const requestTimeoutSeconds = parseInt(requestTimeoutElement.value, 10);
                const requestTimeoutMillis = requestTimeoutSeconds * 1000; // Convert to milliseconds for storage
                // Ensure the timeout is not less than 1 second
                const timeoutToSave = isNaN(requestTimeoutMillis) || requestTimeoutMillis < 1000 ? 1000 : requestTimeoutMillis;
                const commandThrottleEnabled = commandThrottleEnabledElement.checked;
                const parsedDelay = parseInt(commandThrottleDelayMsElement.value, 10);
                const commandThrottleDelayMs = isNaN(parsedDelay) || parsedDelay < 0 ? 500 : parsedDelay;
                const parsedRetryCount = parseInt(retryCountElement.value, 10);
                const retryCount = isNaN(parsedRetryCount) || parsedRetryCount < 0 ? 1 : parsedRetryCount;
                const parsedRetryDelay = parseInt(retryDelayMsElement.value, 10);
                const retryDelayMs = isNaN(parsedRetryDelay) || parsedRetryDelay < 0 ? 500 : parsedRetryDelay;

                try {
                    await homeySet('myAirIp', newIp);
                    await homeySet('pollingInterval', intervalToSave);
                    await homeySet('requestTimeout', timeoutToSave);
                    await homeySet('commandThrottleEnabled', commandThrottleEnabled);
                    await homeySet('commandThrottleDelayMs', commandThrottleDelayMs);
                    await homeySet('retryCount', retryCount);
                    await homeySet('retryDelayMs', retryDelayMs);

                    Homey.alert('Settings saved successfully! Polling interval and request timeout changes require app restart. Command throttling and retry settings apply immediately.');
                } catch (err) {
                    Homey.alert(err);
                }
            });
        }
    </script>
</body>
</html>
